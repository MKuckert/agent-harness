version: 1
id: fsro
name: fsro
servers:
    - type: image
      secrets: default
      tools:
        - directory_tree
        - get_file_info
        - head_file
        - list_directory
        - read_file_lines
        - read_multiple_text_files
        - read_text_file
        - search_files
        - search_files_content
        - tail_file
      image: mcp/rust-mcp-filesystem@sha256:e86df91c151cea46b561396b9ed2c1ff809562dd06d2e3395682c77a261241ca
      catalog_ref: mcp/docker-mcp-catalog:latest
      snapshot:
        server:
            name: rust-mcp-filesystem
            type: server
            image: mcp/rust-mcp-filesystem@sha256:e86df91c151cea46b561396b9ed2c1ff809562dd06d2e3395682c77a261241ca
            description: The Rust MCP Filesystem is a high-performance, asynchronous, and lightweight Model Context Protocol (MCP) server built in Rust for secure and efficient filesystem operations. Designed with security in mind, it operates in read-only mode by default and restricts clients from updating allowed directories via MCP Roots unless explicitly enabled, ensuring robust protection against unauthorized access. Leveraging asynchronous I/O, it delivers blazingly fast performance with a minimal resource footprint. Optimized for token efficiency, the Rust MCP Filesystem enables large language models (LLMs) to precisely target searches and edits within specific sections of large files and restrict operations by file size range, making it ideal for efficient file exploration, automation, and system integration.
            title: Rust Filesystem
            icon: https://raw.githubusercontent.com/rust-mcp-stack/rust-mcp-filesystem/refs/heads/main/docs/_media/rust-mcp-filesystem.png
            readme: http://desktop.docker.com/mcp/catalog/v3/readme/rust-mcp-filesystem.md
            remote: {}
            env:
                - name: ENABLE_ROOTS
                  value: '{{rust-mcp-filesystem.enable_roots}}'
                - name: ALLOW_WRITE
                  value: '{{rust-mcp-filesystem.allow_write}}'
            command:
                - '{{rust-mcp-filesystem.allowed_directories|volume-target|into}}'
            volumes:
                - '{{rust-mcp-filesystem.allowed_directories|volume|into}}'
            disableNetwork: true
            tools:
                - name: calculate_directory_size
                  description: Calculates the total size of a directory specified by `root_path`.It recursively searches for files and sums their sizes. The result can be returned in either a `human-readable` format or as `bytes`, depending on the specified `output_format` argument.Only works within allowed directories.
                  arguments:
                    - name: root_path
                      type: string
                      desc: The root directory path to start the size calculation.
                    - name: output_format
                      type: string
                      desc: Defines the output format, which can be either `human-readable` or `bytes`.
                      optional: true
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: create_directory
                  description: Create a new directory or ensure a directory exists. Can create multiple nested directories in one operation. If the directory already exists, this operation will succeed silently. Perfect for setting up directory structures for projects or ensuring required paths exist. Only works within allowed directories.
                  arguments:
                    - name: path
                      type: string
                      desc: The path where the directory will be created.
                  annotations:
                    readOnlyHint: false
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: directory_tree
                  description: Get a recursive tree view of files and directories as a JSON structure. Each entry includes 'name', 'type' (file/directory), and 'children' for directories. Files have no children array, while directories always have a children array (which may be empty). If the 'max_depth' parameter is provided, the traversal will be limited to the specified depth. As a result, the returned directory structure may be incomplete or provide a skewed representation of the full directory tree, since deeper-level files and subdirectories beyond the specified depth will be excluded. The output is formatted with 2-space indentation for readability. Only works within allowed directories.
                  arguments:
                    - name: path
                      type: string
                      desc: The root path of the directory tree to generate.
                    - name: max_depth
                      type: integer
                      desc: Limits the depth of directory traversal
                      optional: true
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: edit_file
                  description: Make line-based edits to a text file. Each edit replaces exact line sequences with new content. Returns a git-style diff showing the changes made. Only works within allowed directories.
                  arguments:
                    - name: edits
                      type: array
                      items:
                        type: object
                      desc: The list of edit operations to apply.
                    - name: path
                      type: string
                      desc: The path of the file to edit.
                    - name: dryRun
                      type: boolean
                      desc: Preview changes using git-style diff format without applying them.
                      optional: true
                    - name: replaceAll
                      type: boolean
                      desc: |-
                        Optional flag to replace all occurrences of `oldText`.

                        Default: `false`.
                        - `false` or `null` → if multiple matches are found, an error is returned.
                        - `true`  → replace all matches.
                      optional: true
                  annotations:
                    readOnlyHint: false
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: find_duplicate_files
                  description: 'Find duplicate files within a directory and return list of duplicated files as text or json formatOptional `pattern` argument can be used to narrow down the file search to specific glob pattern.Optional `exclude_patterns` can be used to exclude certain files matching a glob.`min_bytes` and `max_bytes` are optional arguments that can be used to restrict the search to files with sizes within a specified range.The output_format argument specifies the format of the output and accepts either `text` or `json` (default: text).Only works within allowed directories.'
                  arguments:
                    - name: root_path
                      type: string
                      desc: The root directory path to start the search.
                    - name: exclude_patterns
                      type: array
                      items:
                        type: string
                      desc: Optional list of glob patterns to exclude from the search. File matching these patterns will be ignored.
                      optional: true
                    - name: max_bytes
                      type: integer
                      desc: Maximum file size (in bytes) to include in the search (optional).
                      optional: true
                    - name: min_bytes
                      type: integer
                      desc: Minimum file size (in bytes) to include in the search (default to 1).
                      optional: true
                    - name: output_format
                      type: string
                      desc: 'Specify the output format, accepts either `text` or `json` (default: text).'
                      optional: true
                    - name: pattern
                      type: string
                      desc: Optional glob pattern can be used to match target files.
                      optional: true
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: find_empty_directories
                  description: Recursively finds all empty directories within the given root path.A directory is considered empty if it contains no files in itself or any of its subdirectories.Operating system metadata files `.DS_Store` (macOS) and `Thumbs.db` (Windows) will be ignored.The optional exclude_patterns argument accepts glob-style patterns to exclude specific paths from the search.Only works within allowed directories.
                  arguments:
                    - name: path
                      type: string
                      desc: The path of the file to get information for.
                    - name: exclude_patterns
                      type: array
                      items:
                        type: string
                      desc: Optional list of glob patterns to exclude from the search. Directories matching these patterns will be ignored.
                      optional: true
                    - name: output_format
                      type: string
                      desc: 'Specify the output format, accepts either `text` or `json` (default: text).'
                      optional: true
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: get_file_info
                  description: Retrieve detailed metadata about a file or directory. Returns comprehensive information including size, creation time, last modified time, permissions, and type. This tool is perfect for understanding file characteristics without reading the actual content. Only works within allowed directories.
                  arguments:
                    - name: path
                      type: string
                      desc: The path of the file to get information for.
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: head_file
                  description: Reads and returns the first N lines of a text file.This is useful for quickly previewing file contents without loading the entire file into memory.If the file has fewer than N lines, the entire file will be returned.Only works within allowed directories.
                  arguments:
                    - name: lines
                      type: integer
                      desc: The number of lines to read from the beginning of the file.
                    - name: path
                      type: string
                      desc: The path of the file to get information for.
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: list_allowed_directories
                  description: Returns a list of directories that the server has permission to access Subdirectories within these allowed directories are also accessible. Use this to identify which directories and their nested paths are available before attempting to access files.
                  arguments: []
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: list_directory
                  description: Get a detailed listing of all files and directories in a specified path. Results clearly distinguish between files and directories with [FILE] and [DIR] prefixes. This tool is essential for understanding directory structure and finding specific files within a directory. Only works within allowed directories.
                  arguments:
                    - name: path
                      type: string
                      desc: The path of the directory to list.
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: list_directory_with_sizes
                  description: Get a detailed listing of all files and directories in a specified path, including sizes. Results clearly distinguish between files and directories with [FILE] and [DIR] prefixes. This tool is useful for understanding directory structure and finding specific files within a directory. Only works within allowed directories.
                  arguments:
                    - name: path
                      type: string
                      desc: The path of the directory to list.
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: move_file
                  description: Move or rename files and directories. Can move files between directories and rename them in a single operation. If the destination exists, the operation will fail. Works across different directories and can be used for simple renaming within the same directory. Both source and destination must be within allowed directories.
                  arguments:
                    - name: destination
                      type: string
                      desc: The destination path to move the file to.
                    - name: source
                      type: string
                      desc: The source path of the file to move.
                  annotations:
                    readOnlyHint: false
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: read_file_lines
                  description: Reads lines from a text file starting at a specified line offset (0-based) and continues for the specified number of lines if a limit is provided.This function skips the first 'offset' lines and then reads up to 'limit' lines if specified, or reads until the end of the file otherwise.It's useful for partial reads, pagination, or previewing sections of large text files.Only works within allowed directories.
                  arguments:
                    - name: offset
                      type: integer
                      desc: Number of lines to skip from the start (0-based).
                    - name: path
                      type: string
                      desc: The path of the file to get information for.
                    - name: limit
                      type: integer
                      desc: Optional maximum number of lines to read after the offset.
                      optional: true
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: read_media_file
                  description: Reads an image or audio file and returns its Base64-encoded content along with the corresponding MIME type. The max_bytes argument could be used to enforce an upper limit on the size of a file to read if the media file exceeds this limit, the operation will return an error instead of reading the media file. Access is restricted to files within allowed directories only.
                  arguments:
                    - name: path
                      type: string
                      desc: The path of the file to read.
                    - name: max_bytes
                      type: integer
                      desc: Maximum allowed file size (in bytes) to be read.
                      optional: true
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: read_multiple_media_files
                  description: Reads multiple image or audio files and returns their Base64-encoded contents along with corresponding MIME types. This method is more efficient than reading files individually. The max_bytes argument could be used to enforce an upper limit on the size of a file to read Failed reads for specific files are skipped without interrupting the entire operation. Only works within allowed directories.
                  arguments:
                    - name: paths
                      type: array
                      items:
                        type: string
                      desc: The list of media file paths to read.
                    - name: max_bytes
                      type: integer
                      desc: Maximum allowed file size (in bytes) to be read.
                      optional: true
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: read_multiple_text_files
                  description: Read the contents of multiple text files simultaneously as text. This is more efficient than reading files one by one when you need to analyze or compare multiple files. Each file's content is returned with its path as a reference. Failed reads for individual files won't stop the entire operation. Only works within allowed directories.
                  arguments:
                    - name: paths
                      type: array
                      items:
                        type: string
                      desc: The list of file paths to read.
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: read_text_file
                  description: Read the complete contents of a text file from the file system as text. Handles various text encodings and provides detailed error messages if the file cannot be read. Use this tool when you need to examine the contents of a single file. Optionally include line numbers for precise code targeting. Only works within allowed directories.
                  arguments:
                    - name: path
                      type: string
                      desc: The path of the file to read.
                    - name: with_line_numbers
                      type: boolean
                      desc: |-
                        Optional: Include line numbers in output (default: false).
                        When enabled, each line is prefixed with a right-aligned, 1-based line number
                        Followed by a space, a vertical bar (`|`), and another space in the format: `   123 | <original line content>`
                      optional: true
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: search_files
                  description: Recursively search for files and directories matching a pattern. Searches through all subdirectories from the starting path. The search is case-insensitive and matches partial names. Returns full paths to all matching items.Optional 'min_bytes' and 'max_bytes' arguments can be used to filter files by size, ensuring that only files within the specified byte range are included in the search. This tool is great for finding files when you don't know their exact location or find files by their size.Only searches within allowed directories.
                  arguments:
                    - name: path
                      type: string
                      desc: The directory path to search in.
                    - name: pattern
                      type: string
                      desc: Glob pattern used to match target files (e.g., "*.rs").
                    - name: excludePatterns
                      type: array
                      items:
                        type: string
                      desc: Optional list of patterns to exclude from the search.
                      optional: true
                    - name: max_bytes
                      type: integer
                      desc: Maximum file size (in bytes) to include in the search (optional).
                      optional: true
                    - name: min_bytes
                      type: integer
                      desc: Minimum file size (in bytes) to include in the search (optional).
                      optional: true
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: search_files_content
                  description: Searches for text or regex patterns in the content of files matching matching a GLOB pattern.Returns detailed matches with file path, line number, column number and a preview of matched text.By default, it performs a literal text search; if the 'is_regex' parameter is set to true, it performs a regular expression (regex) search instead.Optional 'min_bytes' and 'max_bytes' arguments can be used to filter files by size, ensuring that only files within the specified byte range are included in the search. Ideal for finding specific code, comments, or text when you don’t know their exact location.
                  arguments:
                    - name: path
                      type: string
                      desc: The file or directory path to search in.
                    - name: pattern
                      type: string
                      desc: The file glob pattern to match (e.g., "*.rs").
                    - name: query
                      type: string
                      desc: Text or regex pattern to find in file contents (e.g., 'TODO' or '^function\\s+').
                    - name: excludePatterns
                      type: array
                      items:
                        type: string
                      desc: Optional list of patterns to exclude from the search.
                      optional: true
                    - name: is_regex
                      type: boolean
                      desc: 'Whether the query is a regular expression. If false, the query as plain text. (Default : false)'
                      optional: true
                    - name: max_bytes
                      type: integer
                      desc: Maximum file size (in bytes) to include in the search (optional).
                      optional: true
                    - name: min_bytes
                      type: integer
                      desc: Minimum file size (in bytes) to include in the search (optional).
                      optional: true
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: tail_file
                  description: Reads and returns the last N lines of a text file.This is useful for quickly previewing file contents without loading the entire file into memory.If the file has fewer than N lines, the entire file will be returned.Only works within allowed directories.
                  arguments:
                    - name: lines
                      type: integer
                      desc: The number of lines to read from the ending of the file.
                    - name: path
                      type: string
                      desc: The path of the file to get information for.
                  annotations:
                    readOnlyHint: true
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: unzip_file
                  description: |-
                    Extracts the contents of a ZIP archive to a specified target directory.
                    It takes a source ZIP file path and a target extraction directory.
                    The tool decompresses all files and directories stored in the ZIP, recreating their structure in the target location.
                    Both the source ZIP file and the target directory should reside within allowed directories.
                  arguments:
                    - name: target_path
                      type: string
                      desc: Path to the target directory where the contents of the ZIP file will be extracted.
                    - name: zip_file
                      type: string
                      desc: A filesystem path to an existing ZIP file to be extracted.
                - name: write_file
                  description: Create a new file or completely overwrite an existing file with new content. Use with caution as it will overwrite existing files without warning. Handles text content with proper encoding. Only works within allowed directories.
                  arguments:
                    - name: content
                      type: string
                      desc: The content to write to the file.
                    - name: path
                      type: string
                      desc: The path of the file to write to.
                  annotations:
                    readOnlyHint: false
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
                - name: zip_directory
                  description: |-
                    Creates a ZIP archive by compressing a directory , including files and subdirectories matching a specified glob pattern.
                    It takes a path to the folder and a glob pattern to identify files to compress and a target path for the resulting ZIP file.
                    Both the source directory and the target ZIP file should reside within allowed directories.
                  arguments:
                    - name: input_directory
                      type: string
                      desc: Path to the directory to zip
                    - name: target_zip_file
                      type: string
                      desc: Path to save the resulting ZIP file, including filename and .zip extension
                    - name: pattern
                      type: string
                      desc: A optional glob pattern to match files and subdirectories to zip, defaults to **/*"
                      optional: true
                - name: zip_files
                  description: Creates a ZIP archive by compressing files. It takes a list of files to compress and a target path for the resulting ZIP file. Both the source files and the target ZIP file should reside within allowed directories.
                  arguments:
                    - name: input_files
                      type: array
                      items:
                        type: string
                      desc: The list of files to include in the ZIP archive.
                    - name: target_zip_file
                      type: string
                      desc: Path to save the resulting ZIP file, including filename and .zip extension
                  annotations:
                    readOnlyHint: false
                    destructiveHint: false
                    idempotentHint: false
                    openWorldHint: false
            config:
                - description: Configure rust-mcp-filesystem to allow access only to permitted directories.
                  name: rust-mcp-filesystem
                  properties:
                    allow_write:
                        description: Enable read/write mode. If false, the app operates in read-only mode.
                        type: boolean
                    allowed_directories:
                        description: List of directories that rust-mcp-filesystem can access.
                        items:
                            type: string
                        type: array
                    enable_roots:
                        description: Enable dynamic directory access control via MCP client-side Roots.
                        type: boolean
                  type: object
            metadata:
                pulls: 8841
                stars: 1
                githubStars: 146
                category: productivity
                tags:
                    - productivity
                license: MIT License
                owner: rust-mcp-stack
secrets:
    default:
        provider: docker-desktop-store
